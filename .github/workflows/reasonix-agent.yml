name: Reasonix DeepSeek Core Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  reasonix_review:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码并获取完整的 Git 历史（以便 Reasonix 读取上下文）
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Node 环境（Reasonix 1.0+ 的分发机制依然完美支持 npx 一键调用）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 将 Git Diff 暂存为文件，供 Reasonix 智能体分析
      - name: Generate Code Diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_changes.diff

      # 4. 运行 Reasonix 智能体进行深度推理审查
      - name: Run Reasonix Agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat > reasonix_prompt.txt << 'PROMPT_END'
          请按以下项目级审查标准 review PR 代码变更：

          ## 审查标准
          PROMPT_END
          cat .reasonix/commands/code-review.md >> reasonix_prompt.txt
          printf '\n\n## 代码变更 Diff\n\n' >> reasonix_prompt.txt
          cat pr_changes.diff >> reasonix_prompt.txt
          
          npx reasonix code --model deepseek-v4-pro --task "$(cat reasonix_prompt.txt)" > reasonix_report.md

      # 5. 将 Reasonix 的推理审查报告自动以评论形式发表在 PR 下面
      - name: Post Comment to PR
        uses: mshick/github-actions-comment-on-pr@v3
        with:
          file_path: "reasonix_report.md"
          github_token: ${{ secrets.GITHUB_TOKEN }}
