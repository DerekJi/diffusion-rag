name: Reasonix PR Follow-up Developer

# 触发：有人在 PR 评论区发表评论时触发
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai_followup:
    # 过滤条件：
    # 1. 必须是 Pull Request 下的评论（不是普通 Issue）
    # 2. 评论包含 /fix 指令
    # 3. 触发者不是机器人自己（防止死循环）
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/fix') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest

    steps:
      # ── 1. 获取 PR 分支信息 ──────────────────────────────
      - name: Get PR Branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('title', pr.data.title);
            core.setOutput('number', context.issue.number);

      # ── 2. 检出 PR 分支 ──────────────────────────────────
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      # ── 3. 设置 Python + Node ────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. 缓存 HuggingFace 模型 ──────────────────────────
      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-models-

      # ── 5. 安装依赖 ──────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 6. 提取 PR review 中的 model level ─────────────
      # PR issue body 中可写 level: low / medium / high
      # 默认 medium → deepseek-v4-pro, 默认加 -yolo
      - name: Extract Model Level
        id: model
        shell: bash
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body --jq .body 2>/dev/null || echo "")
          LEVEL=$(echo "$ISSUE_BODY" | grep -i '^level:' | head -1 | sed 's/.*:[[:space:]]*//i' | tr '[:upper:]' '[:lower:]' | xargs || echo "")
          if [ -z "$LEVEL" ]; then LEVEL="medium"; fi
          case "$LEVEL" in
            low|flash) echo "model=deepseek-v4-flash" >> $GITHUB_OUTPUT;;
            medium|pro|high) echo "model=deepseek-v4-pro" >> $GITHUB_OUTPUT;;
            *) echo "model=deepseek-v4-pro" >> $GITHUB_OUTPUT;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. 组装修复 Prompt ───────────────────────────────
      #    提取 /fix 后面的意见 + 注入工程规范
      - name: Formulate Fix Prompt
        id: prompt
        shell: bash
        run: |
          # 提取用户评论中 /fix 后面的内容
          RAW_COMMENT='${{ github.event.comment.body }}'
          FEEDBACK=$(echo "$RAW_COMMENT" | sed 's/\/fix//g' | xargs)

          cat > fix_prompt.txt << 'PROMPT_END'
          # AI 在线修复任务

          ## 用户 Review 意见
          PROMPT_END
          echo "$FEEDBACK" >> fix_prompt.txt

          # 注入项目标准
          printf '\n\n## 项目修复标准 (fix-bug.md)\n' >> fix_prompt.txt
          cat .reasonix/commands/fix-bug.md >> fix_prompt.txt
          printf '\n\n## 项目开发规范 (develop.md)\n' >> fix_prompt.txt
          cat .reasonix/commands/develop.md >> fix_prompt.txt

          cat >> fix_prompt.txt << 'PROMPT_END'

          ## 项目背景
          - Python 3.10+, pytest, black (line-length=100), isort, mypy --strict
          - 模块: src/baseline/, src/vector_store/, src/evaluation/, src/utils/
          - 测试: tests/test_baseline.py, tests/test_utils.py

          ## 执行要求
          1. 读取用户的 Review 意见，理解需要改什么
          2. 在当前代码上直接修改文件
          3. 修改后运行 `black . --line-length 100 && isort .` 格式化
          4. 运行 `pytest tests/ -q -m "not slow"` 确认测试通过
          5. 如果测试失败，读取报错自行修复，直到测试全绿
          6. 最终输出改了什么文件、改了什么逻辑
          PROMPT_END

          echo "Fix prompt assembled ($(wc -l < fix_prompt.txt) lines)"

      # ── 7. 运行 Reasonix 在线修复 ─────────────────────────
      - name: Run Reasonix to Fix Code
        id: fix
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          npx reasonix code --model "${{ steps.model.outputs.model }}" -yolo --task "$(cat fix_prompt.txt)"

      # ── 8. 验证修复结果 ──────────────────────────────────
      - name: Run Tests After Fix
        id: verify
        continue-on-error: true
        run: |
          black . --line-length 100 --check
          isort . --check-only
          pytest tests/ -q -m "not slow" --cov=src --cov-report=term-missing | tail -15

      # ── 9. 如果验证失败，让 AI 自修复一次 ────────────────
      - name: Auto-fix Round 2
        if: steps.verify.outcome == 'failure'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "Tests still failing after fix, running auto-repair..." >> $GITHUB_STEP_SUMMARY
          cat > repair_prompt.txt << 'PROMPT_END'
          # 自修复

          测试或格式检查仍未通过。请：
          1. 读取上一步的报错信息
          2. 定位失败的测试或格式问题
          3. 修复代码
          4. 运行 black . --line-length 100 && isort .
          5. 运行 pytest tests/ -q -m "not slow"
          6. 重复直到全绿
          PROMPT_END
          npx reasonix code --model "${{ steps.model.outputs.model }}" -yolo --task "$(cat repair_prompt.txt)"

          # 再跑一次验证
          black . --line-length 100 --check
          isort . --check-only
          pytest tests/ -q -m "not slow" | tail -5

      # ── 10. 提交并 Push ─────────────────────────────────
      - name: Commit and Push Fixes
        run: |
          git config --global user.name "Reasonix-AI-Developer"
          git config --global user.email "ai-developer@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "fix: address review feedback

            🤖 Auto-fix by Reasonix + DeepSeek
            Responds to: #${{ steps.pr.outputs.number }}"

            git push origin ${{ steps.pr.outputs.branch }}
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
            echo "没有检测到代码变更。" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 11. 回复用户 ────────────────────────────────────
      - name: Reply to Comment
        uses: actions/github-script@v7
        with:
          script: |
            const changed = process.env.CHANGED === 'true';
            const body = changed
              ? "🤖 **Reasonix** 已根据您的 Review 意见修改了代码，并验证通过。\n\n刷新 PR 查看最新 Diff。"
              : "🤖 **Reasonix** 评估了您的意见，但没有产生代码变更。可能是当前代码已符合要求，或请检查 /fix 指令后的描述。";

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
